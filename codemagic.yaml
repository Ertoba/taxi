workflows:
  ios-unsigned:
    name: Mili Taxi Rider iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - taxi_ios_secrets
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Print source identity
        script: |
          set -e
          SOURCE_COMMIT="$(git rev-parse HEAD)"
          echo "Codemagic commit: ${CM_COMMIT:-not-set}"
          echo "Checked out commit: $SOURCE_COMMIT"
          echo "Checked out branch: $(git branch --show-current)"

          if [ -n "${CM_COMMIT:-}" ] && [ "$SOURCE_COMMIT" != "$CM_COMMIT" ]; then
            echo "Codemagic checked out a different commit"
            exit 1
          fi

      - name: Validate Rider fixes in source
        script: |
          set -e

          grep -q 'version: 1.0.6+10' pubspec.yaml
          grep -q 'google_maps_flutter_ios_sdk10: ^2.18.5' pubspec.yaml

          ONBOARDING='lib/presentation/screens/onboarding/on_boarding_screen.dart'
          OTP='lib/presentation/screens/auth/otp_screen.dart'
          SAFE_RIDE='lib/presentation/cubits/realtime/safe_ride_request_cubit.dart'
          REGISTER='lib/app/register_cubits.dart'

          if grep -Eq 'Or continue using|GoogleLoginCubit|AppleLoginCubit|google_icon|apple_icon' "$ONBOARDING"; then
            echo "Old social-auth UI is still present in Rider onboarding"
            exit 1
          fi

          grep -q 'bottomSheet: showToolbar' "$OTP"
          grep -q 'value.length == 6' "$OTP"
          grep -q '_dismissKeyboard' "$OTP"

          test -f "$SAFE_RIDE"
          grep -q 'class SafeRideRequestCubit extends RideRequestCubit' "$SAFE_RIDE"
          grep -q '_driverRecordSafeForHive' "$SAFE_RIDE"
          grep -q '_hiveSafeValue' "$SAFE_RIDE"
          grep -Fq "_stringValue(data['driverId'])" "$SAFE_RIDE"
          grep -q 'BlocProvider<RideRequestCubit>' "$REGISTER"
          grep -q 'SafeRideRequestCubit()' "$REGISTER"

          test -f assets/language/ka.json
          test -f assets/language/en.json

          echo "Rider OTP, Firebase type, Hive safety and localization checks passed"

      - name: Disable Swift Package Manager
        script: |
          set -e
          flutter config --no-enable-swift-package-manager

      - name: Get Flutter packages
        script: |
          set -e
          flutter clean
          flutter pub get

          if ! grep -q 'google_maps_flutter_ios_sdk10' .flutter-plugins-dependencies; then
            echo "The SDK 10-specific iOS Maps implementation was not selected"
            exit 1
          fi

      - name: Parse-check Rider ride flow
        script: |
          set -e
          dart format --output=none \
            lib/presentation/cubits/realtime/safe_ride_request_cubit.dart \
            lib/app/register_cubits.dart

          flutter analyze \
            --no-fatal-infos \
            --no-fatal-warnings \
            lib/presentation/cubits/realtime/safe_ride_request_cubit.dart \
            lib/app/register_cubits.dart

      - name: Validate Google Maps keys
        script: |
          set -e

          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "GOOGLE_MAPS_API_KEY is missing"
            exit 1
          fi

          if [ -z "$GOOGLE_WEB_SERVICES_KEY" ]; then
            echo "GOOGLE_WEB_SERVICES_KEY is missing"
            exit 1
          fi

          echo "Google Maps key variables are available"

      - name: Configure native key and build fingerprint
        script: |
          set -e
          PLIST='ios/Runner/Info.plist'
          SOURCE_COMMIT="$(git rev-parse HEAD)"
          SHORT_COMMIT="$(git rev-parse --short=7 HEAD)"

          /usr/libexec/PlistBuddy \
            -c "Set :GMSApiKey $GOOGLE_MAPS_API_KEY" \
            "$PLIST"

          /usr/libexec/PlistBuddy -c 'Delete :MiliGitCommit' "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c 'Delete :MiliShortCommit' "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c 'Delete :MiliBuildNumber' "$PLIST" 2>/dev/null || true

          /usr/libexec/PlistBuddy -c "Add :MiliGitCommit string $SOURCE_COMMIT" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :MiliShortCommit string $SHORT_COMMIT" "$PLIST"
          /usr/libexec/PlistBuddy -c 'Add :MiliBuildNumber string 10' "$PLIST"

          echo "Native Google Maps key and build fingerprint configured"

      - name: Configure iOS 16 deployment target
        script: |
          set -e
          sed -i '' -E \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' \
            ios/Runner.xcodeproj/project.pbxproj

          /usr/libexec/PlistBuddy \
            -c "Set :MinimumOSVersion 16.0" \
            ios/Flutter/AppFrameworkInfo.plist

          echo "iOS deployment target configured as 16.0"

      - name: Install CocoaPods and verify Maps SDK
        script: |
          set -e
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

          if ! grep -Eq 'GoogleMaps \(10\.' Podfile.lock; then
            echo "Google Maps SDK for iOS 10.x was not installed"
            grep -E 'GoogleMaps|google_maps_flutter' Podfile.lock || true
            exit 1
          fi

          if ! grep -q 'google_maps_flutter_ios_sdk10' Podfile.lock; then
            echo "SDK 10-specific Flutter iOS Maps plugin was not installed"
            grep -E 'GoogleMaps|google_maps_flutter' Podfile.lock || true
            exit 1
          fi

          grep -E 'GoogleMaps|google_maps_flutter' Podfile.lock
          cd ..

      - name: Build iOS without code signing
        script: |
          set -e
          flutter build ios \
            --release \
            --no-codesign \
            --build-number=10 \
            --dart-define=GOOGLE_WEB_SERVICES_KEY="$GOOGLE_WEB_SERVICES_KEY" \
            --dart-define=MILI_GIT_COMMIT="$(git rev-parse HEAD)"

      - name: Verify built Rider app
        script: |
          set -e
          APP='build/ios/iphoneos/Runner.app'
          PLIST="$APP/Info.plist"
          FLUTTER_ASSETS="$APP/Frameworks/App.framework/flutter_assets"

          if [ ! -d "$APP" ]; then
            echo "Runner.app was not found"
            exit 1
          fi

          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")" = '10'
          test "$(/usr/libexec/PlistBuddy -c 'Print :MiliGitCommit' "$PLIST")" = "$(git rev-parse HEAD)"
          test "$(/usr/libexec/PlistBuddy -c 'Print :MiliBuildNumber' "$PLIST")" = '10'
          test -f "$FLUTTER_ASSETS/assets/language/ka.json"
          test -f "$FLUTTER_ASSETS/assets/language/en.json"

          echo "Bundle ID: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PLIST")"
          echo "Version: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          echo "Build: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          echo "Commit: $(/usr/libexec/PlistBuddy -c 'Print :MiliGitCommit' "$PLIST")"
          echo "Rider localization assets are bundled"

      - name: Package uniquely named unsigned IPA
        script: |
          set -e
          SHORT_COMMIT="$(git rev-parse --short=7 HEAD)"
          ARTIFACT="mili-taxi-rider-${SHORT_COMMIT}-build10-unsigned.ipa"

          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload

          cp -R \
            build/ios/iphoneos/Runner.app \
            build/ios/ipa/Payload/

          cd build/ios/ipa
          zip -qry "../$ARTIFACT" Payload
          cd ../../..

          echo "Rider unsigned IPA created: $ARTIFACT"

    artifacts:
      - build/ios/mili-taxi-rider-*-build10-unsigned.ipa
