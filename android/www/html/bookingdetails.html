<ons-page id="bookingdetails">
        <ons-toolbar>
          <div class="left"><ons-back-button>Back</ons-back-button></div>
          <div id='booking-details-title' class="center" data-i18nbookdet="Trip Detail">Trip Detail</div>
          <div style='display:none;'><img id="driver-image-preload" src=""></div>
        </ons-toolbar>        
               <div class="screen-wrap-white" style="position:relative;overflow: hidden;">
                  <div class="driver-details" style="padding:0 15px;background-color: white;" >
                    <div style="display:flex;flex-wrap: nowrap;align-items: center;gap:10px;width:100%;height:140px;">
                      <div style="display:inline-block;text-align:center;margin: 0 0 0 20px;">
                          <img id="driver-image" style='display:block;width:64px;border-radius:50%;' src="img/dummy-user.png">                                                            
                      </div>
                    
                      <div style="width:50%;display:inline-block;margin: 0 20px 0 0;">                    
                          <p id="driver-name" style="margin: 1px 0; font-weight:bold"></p>                                  
                          <div><img id="driver-rating" style="width:64px;" src=""></div>
                          <p id="driver-car-details" style="margin: 1px 0;font-size:14px;"></p>
                          <p id="driver-plate-num" style="margin: 1px 0;font-size:14px;"></p>                         
                                                                  
                      </div>
                      
                      <div id="contact-driver" style="display: none;flex-wrap: nowrap;align-items: center;justify-content: flex-end;">
                          <ons-button id="call-driver-btn" data-number="" style='border: thin solid;color: black;margin-right: 5px;' modifier='outline' onclick="call_driver($(this).data('number'))"><ons-icon icon='fa-phone' ></ons-icon></ons-button>
                          <ons-button id="sms-driver-btn" data-number="" style='border: thin solid;color: black;margin-right: 5px;' modifier='outline' onclick="sms_driver($(this).data('number'))"><ons-icon icon='fa-envelope' ></ons-icon></ons-button>
                          <!-- <ons-button id="chat-driver-btn" data-bookingid="" style='border: thin solid;color: black;' modifier='outline' onclick="var el = $(this);chat_window.show({animation:'fade'});chat_update_content(el.data('bookingid'));$('#chat-msg-send-btn').data('bookingid', el.data('bookingid'))" ><ons-icon icon='fa-comment' ></ons-icon></ons-button> -->
                      </div>
                    </div>
                    
                  </div>  
                  <div id="booking-details-map" style="height:200px;background-image: url(img/map-placeholder.png);background-size: cover;background-position: center;"></div>

                  <div id="booking-details-data-container" style="width:100%;overflow-x:hidden;overflow-y: auto;position:absolute;top:340px;left:0;height: calc(100% - 140px);backface-visibility:hidden;transition: all 0.3s ease-in-out;transform:translateY(0);">
                    
                    <div style='box-sizing: border-box;width: 100%;overflow: hidden;background-color: white;padding: 10px 20px;border-bottom: solid thin lightgray;'>
                        <div style="border-left: 2px dashed #ccc">
                            <p style='margin: 10px 0 30px 0;position: relative;padding-left: 15px;'>
                                <ons-icon icon='fa-dot-circle' size='18px' style='color: #8bc34a;position: absolute;font-size: 17px;left: -9px;top: -3px;background-color: white;'></ons-icon>
                                <span id="pick-up-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                            <p id="bk-det-waypoint1" style='margin: 10px 0 30px 0;position: relative;padding-left: 15px;display:none;'>
                                <ons-icon icon='fa-circle' size='18px' style='color: orange;position: absolute;font-size: 17px;left: -9px;top: -3px;background-color: white;'></ons-icon>
                                <span id="bk-det-waypoint1-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                            <p id="bk-det-waypoint2" style='margin: 10px 0 30px 0;position: relative;padding-left: 15px;display:none;'>
                                <ons-icon icon='fa-circle' size='18px' style='color: orange;position: absolute;font-size: 17px;left: -9px;top: -3px;background-color: white;'></ons-icon>
                                <span id="bk-det-waypoint2-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                            <p style='margin:0;position: relative;padding-left: 15px;'>
                                <ons-icon icon='fa-square' size='18px' style='color: rgb(250, 75, 75);position: absolute;font-size: 18px;left: -8px;bottom: 0px;border-bottom: 3px solid white;background-color: white;'></ons-icon>
                                <span id="drop-off-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                        </div>
                    </div>
                    <div style="position:relative;">
                      <table style="min-height:700px;width:100%;table-layout: fixed;background-color:white;">
                        <tbody>                                                          
                          
                          <tr>
                            <td colspan="10">
                                <p style="color:#8a8a8a;font-size:12px;margin: 5px 0;text-align:center;" data-i18nbookdet="Fare">Fare </p>
                                <p id = "bookride_cost_det" style="font-weight:bold;font-size:22px;margin: 10px 0;text-overflow: ellipsis;overflow: hidden;text-align:center;">0.00</p>
                            </td>
                          </tr>
                          <tr>
                            <td colspan="10">
                                <div style="display: flex;flex-wrap: nowrap;justify-content: space-between;margin: 20px 0 0 0;align-items: center;padding-bottom: 20px;">
                  
                                    <div style="text-align:center;display:inline-block;width:32%">
                                        <div style="display: flex;flex-wrap: nowrap;align-items:center;justify-content: center;"><ons-icon style="color:#00bcd4;font-size:12px;margin-right:3px;" icon='fa-arrows-h' ></ons-icon> <p style="font-size:14px;" data-i18nbookdet="Distance">Distance</p></div>
                                        <p style="font-size:14px;margin: 0;font-weight: bold;" id="trip-distance">0KM</p>
                                    </div>

                                    <div style="text-align:center;display:inline-block;width:32%;border-left: thin solid #ccc;border-right: thin solid #ccc;">
                                        <div style="display: flex;flex-wrap: nowrap;align-items:center;justify-content: center;"><ons-icon style="color:#ffc107;font-size:12px;margin-right:3px;" icon='fa-clock' ></ons-icon> <p style="font-size:14px;" data-i18nbookdet="Time">Time</p></div>
                                        <p style="font-size:14px;margin: 0;font-weight: bold;" id="trip-duration">0S</p>
                                    </div>

                                    <div style="text-align:center;display:inline-block;width:32%">
                                        <div style="display: flex;flex-wrap: nowrap;align-items:center;justify-content: center;"><ons-icon style="color:#8bc34a;font-size:12px;margin-right:3px;" icon='fa-tag' ></ons-icon> <p style="font-size:14px;" data-i18nbookdet="Discount">Discount</p></div>
                                        <p style="font-size:14px;margin: 0;font-weight: bold;" id="trip-discount">0%</p>
                                    </div>
                                </div>
                            </td>
                          </tr>

                          <tr>
                              <td colspan="10" style="border-bottom: solid thin lightgray;padding-top: 6px;padding-bottom: 6px 20px;">
                                <p style="color:#8a8a8a;font-size:12px;margin: 0 0;text-align: center;" data-i18nbookdet="Vehicle type">Vehicle type</p>
                                <div style="text-align: center;padding: 5px 0;"><img id="route-ride-image" style="height:50px;" src="img/ride-sample.png"></div>
                                <p id="selected-ride" style="text-align:center;"></p>
                              </td>
                          </tr>
                          
                          <tr>
                            <td colspan="10" style="border-bottom: solid thin lightgray;padding: 6px 20px;">
                              <div>
                                <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookdet="Pick up Time">Pick up Time </p>
                                <p id="puc_dt_det" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookdet=""></p>
                                
                              </div>
                            </td>
                          </tr>
              
                                  
                                      
                            <tr>                              
                                <td style="border-bottom: solid thin lightgray;padding: 6px 20px;" colspan="10">
                                  <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookdet="Service Type">Service Type </p>
                                  <p id = "booking-service-type" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookdet="">Taxi</p>
                                </td>            
                            </tr>

                            <tr>
                                
                                <td style="border-bottom: solid thin lightgray;padding: 6px 20px;" colspan="10">
                                    <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookdet="Coupon">Coupon</p>
                                    <p id = "coupon-code-det" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookdet="None">None</p>
                                </td>
              
                            </tr>
              
                            <tr>
                                <td colspan="10" style="padding: 6px 20px 30px 20px;">
                                  <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookdet="Payment method">Payment method</p>
                                  <p id="payment-type-det" style='margin: 3px 0;' data-i18nbookdet=""></p>
                                </td>
                            </tr>
                            
                          </tbody>
                        </table>
                    </div>                      
                  </div>
                </div> 
            
                      
           
      <script>
        

        var x = document.getElementById("driver-image-preload");
        x.onload = function() {
          var y = document.getElementById("driver-image");
          y.src = x.src;
        };

        
      
      </script>


</ons-page>
